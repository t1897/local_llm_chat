          renderPresetSelect();
          setStatus("已取消预设绑定，当前参数保持不变。");
          return;
        }
        applyPresetById(presetId);
      });

      savePresetBtn.addEventListener("click", () => {
        saveNewPreset();
      });

      updatePresetBtn.addEventListener("click", () => {
        updateCurrentPreset();
      });

      deletePresetBtn.addEventListener("click", () => {
        deleteCurrentPreset();
      });

      presetNameEl.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        saveNewPreset();
      });

      modelEl.addEventListener("change", () => {
        saveSelectedModel();
      });

      addModelBtn.addEventListener("click", () => {
        const modelId = normalizeModelId(customModelIdEl.value);
        if (!modelId) {
          setStatus("请输入要添加的模型 ID。");
          return;
        }
        const added = addCustomModel(modelId);
        renderModelOptions(modelId);
        modelEl.value = modelId;
        saveSelectedModel();
        if (added) {
          setStatus(`已添加模型：${modelId}`);
        } else {
          setStatus(`模型已存在：${modelId}`);
        }
      });

      removeModelBtn.addEventListener("click", () => {
        const typed = normalizeModelId(customModelIdEl.value);
        const selected = normalizeModelId(modelEl.value);
        const target = typed || selected;
        if (!target) {
          setStatus("没有可删除的模型。");
          return;
        }
        if (!isCustomModelId(target)) {
          setStatus("只能删除你手动添加的自定义模型。");
          return;
        }
        const removed = removeCustomModel(target);
        if (!removed) {
          setStatus("模型不存在或已删除。");
          return;
        }
        renderModelOptions(selected === target ? "" : selected);
        saveSelectedModel();
        setStatus(`已删除自定义模型：${target}`);
      });

      customModelIdEl.addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        addModelBtn.click();
      });

      chatFeedEl.addEventListener("scroll", () => {
        autoScrollIfNearBottom = isNearBottom(chatFeedEl);
      });

      systemPromptEl.addEventListener("input", saveSystemPrompt);
      tempEl.addEventListener("input", saveTemperature);
      tempEl.addEventListener("change", saveTemperature);
      topPEl.addEventListener("input", saveTopP);
      topPEl.addEventListener("change", saveTopP);
      topKEl.addEventListener("input", saveTopK);
      topKEl.addEventListener("change", saveTopK);
      repetitionPenaltyEl.addEventListener("input", saveRepetitionPenalty);
      repetitionPenaltyEl.addEventListener("change", saveRepetitionPenalty);
      repetitionContextSizeEl.addEventListener("input", saveRepetitionContextSize);
      repetitionContextSizeEl.addEventListener("change", saveRepetitionContextSize);
      maxTokensEl.addEventListener("input", saveMaxTokens);
      maxTokensEl.addEventListener("change", saveMaxTokens);
      streamingEl.addEventListener("change", saveStreaming);
      responseLanguageEl.addEventListener("change", saveResponseLanguage);
      thinkingEl.addEventListener("change", saveThinkingMode);
      loadSavedSystemPrompt();
      loadSavedTemperature();
      loadSavedTopP();
      loadSavedTopK();
      loadSavedRepetitionPenalty();
      loadSavedRepetitionContextSize();
      loadSavedMaxTokens();
      loadSavedStreaming();
      loadSavedResponseLanguage();
      loadSavedThinkingMode();
      loadCustomModelState();
      loadPresetState();
      loadSessionState();
      renderChatFeed({ forceBottom: true });
      setBusy(false);

      if (conversationThreads.length > 1 || conversationHistory.length > 0) {
        setStatus(`已恢复 ${conversationThreads.length} 个会话（关闭浏览器后自动清空）`);
      }

      loadModels()
        .then(() => {
          if (activePresetId) {
            applyPresetById(activePresetId, { silent: true });
          }
        })
        .catch((err) => {
          setStatus("无法加载模型列表: " + (err.message || String(err)));
        });
    </script>
  </body>
</html>
